<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cartão Feed Instagram - Verso</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 636px;
      height: 1116px;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
    }

    .frame {
      position: relative;
      width: 636px;
      height: 1116px;
      border-radius: 30px;
      overflow: hidden;
      background: #f2f2f2;
    }

    .trim-area {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 600px;
      height: 1080px;
      overflow: visible;
      color: #1d1d1d;
    }

    .top-bg {
      position: absolute;
      top: -18px;
      left: -18px;
      width: 636px;
      height: 216px;
      z-index: 1;
    }

    .shape_1 {
      position: absolute;
      left: -216px;
      top: -519px;
      width: 984px;
      height: 837px;
      transform: rotate(-25deg);
      z-index: 2;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .shape_2 {
      position: absolute;
      left: -261px;
      top: 512px;
      width: 965px;
      height: 965px;
      transform: rotate(-19deg);
      z-index: 1;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .top-heart-icon {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 56px;
      line-height: 1;
      z-index: 6;
    }

    .title-small {
      position: absolute;
      top: 118px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: #1d1d1d;
      z-index: 6;
      white-space: nowrap;
    }

    .instagram-logo {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: auto;
      display: block;
      object-fit: contain;
      z-index: 6;
    }

    .subtitle {
      position: absolute;
      top: 250px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #313131;
      z-index: 6;
      white-space: nowrap;
    }

    .qr-wrapper {
      position: absolute;
      top: 348px;
      left: 50%;
      transform: translateX(-50%);
      width: 370px;
      height: 420px;
      border: 4px solid {{verso_qr_border_color}};
      border-radius: 14px;
      background: transparent;
      z-index: 6;
    }

    .qr-box {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-code-verso {
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-caption {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      text-align: center;
      font-size: 18px;
      line-height: 1.35;
      color: #272727;
      white-space: pre-line;
    }

    .footer {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 8;
      color: #1d1d1d;
    }

    .footer-left,
    .footer-right {
      display: flex;
      align-items: center;
    }

    .footer-left {
      gap: 8px;
      min-width: 210px;
    }

    .footer-right {
      gap: 8px;
      min-width: 42px;
      justify-content: flex-end;
    }

    .footer-instagram-icon,
    .footer-whatsapp-icon {
      width: 44px;
      height: 44px;
      object-fit: contain;
      display: block;
    }

    .footer-instagram-text,
    .footer-whatsapp-text {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="trim-area">
      <div class="top-bg"></div>
      <img class="shape_1" src="{{shape_1}}" alt="" />
      <img class="shape_2" src="{{shape_2}}" alt="" />

      <img class="top-heart-icon" src="{{heart_icon}}" alt="Coracao" />

      <div class="title-small">{{verso_title_small}}</div>

      <img class="instagram-logo" src="{{nome_instagram}}" alt="Instagram" />

      <div class="subtitle">{{verso_subtitle}}</div>

      <div class="qr-wrapper">
        <div class="qr-box">
          <div id="qr-code-verso"></div>
        </div>
        <div class="qr-caption">{{verso_qr_caption}}</div>
      </div>

      <div class="footer">
        <div class="footer-left">
          {{#if icon_instagram}}
          <img class="footer-instagram-icon" src="{{icon_instagram}}" alt="Instagram" />
          {{/if}}
          <div class="footer-instagram-text">{{footer_instagram}}</div>
        </div>

        <div class="footer-right">
          <div class="footer-whatsapp-text">{{footer_phone}}</div>
          {{#if icon_whatsapp}}
          <img class="footer-whatsapp-icon" src="{{icon_whatsapp}}" alt="WhatsApp" />
          {{/if}}
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>
  <script>
    const qrCodeVerso = new QRCodeStyling({
      width: 250,
      height: 250,
      type: "canvas",
      shape: "square",
      data: "{{{qr_url}}}",
      image: "{{{qr_logo}}}",
      margin: 0,
      qrOptions: {
        typeNumber: "0",
        mode: "Byte",
        errorCorrectionLevel: "Q"
      },
      dotsOptions: {
        color: "{{qr_dots_color}}",
        type: "rounded",
        roundSize: true
      },
      cornersSquareOptions: {
        color: "{{qr_corners_square_color}}",
        type: "extra-rounded"
      },
      cornersDotOptions: {
       color: "{{qr_corners_dot_color}}",
        type: "dot"
      },
      backgroundOptions: {
        color: "transparent"
      },
      imageOptions: {
        crossOrigin: "anonymous",
        margin: -5,
        imageSize: 0.45,
        hideBackgroundDots: true
      }
    });

    qrCodeVerso.append(document.getElementById("qr-code-verso"));
  </script>
</body>

</html>
