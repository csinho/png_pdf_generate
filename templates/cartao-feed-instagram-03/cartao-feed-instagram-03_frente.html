<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cartão Feed Instagram - Frente 03</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1748px;
      height: 839px;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
    }

    .frame {
      position: relative;
      width: 1748px;
      height: 839px;
      overflow: hidden;
      background: #f7e3b7;
    }

    .note-bg {
      position: absolute;
      inset: 0;
      width: 1748px;
      height: 839px;
      object-fit: cover;
      display: block;
      z-index: 1;
    }

    .overlay-soft {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.00) 100%),
        linear-gradient(0deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.00) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .bottom-notice {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 42px;
      min-height: 92px;
      background: rgba(255, 255, 255, 0.62);
      border: 2px solid rgba(165, 0, 0, 0.18);
      border-radius: 20px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 26px;
      text-align: center;
    }

    .bottom-notice-text {
      font-size: 26px;
      line-height: 1.3;
      font-weight: 700;
      color: #7f0d0d;
      text-transform: uppercase;
    }

    .stamp {
      position: absolute;
      right: 48px;
      top: 136px;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 7px solid rgba(160, 0, 0, 0.42);
      background: rgba(255, 255, 255, 0.15);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-10deg);
      box-shadow: inset 0 0 0 7px rgba(255,255,255,0.18);
    }

    .stamp-text {
      width: 180px;
      text-align: center;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 900;
      color: rgba(145, 0, 0, 0.72);
      text-transform: uppercase;
    }

    .side-warning {
      position: absolute;
      left: 18px;
      top: 120px;
      bottom: 120px;
      width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .side-warning span {
      transform: rotate(-90deg);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      color: rgba(140, 0, 0, 0.62);
      text-transform: uppercase;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="frame">
    {{#if cedula_20_front}}
    <img class="note-bg" src="{{cedula_20_front}}" alt="Cédula de 20 reais ilustrativa" />
    {{/if}}

    <div class="overlay-soft"></div>

    <div class="stamp">
      <div class="stamp-text">
        SEM VALOR<br />ILUSTRATIVO
      </div>
    </div>

    <div class="side-warning">
      <span>imagem ilustrativa</span>
    </div>

    <div class="bottom-notice">
      <div class="bottom-notice-text">
        ESTA ARTE É EXCLUSIVAMENTE ILUSTRATIVA, SEM FINS MONETÁRIOS, SEM VALOR CAMBIAL E NÃO PODE SER UTILIZADA COMO SUBSTITUIÇÃO DE CÉDULA OFICIAL.
      </div>
    </div>
  </div>
</body>

</html>
